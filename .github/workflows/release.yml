name: Release Standalone Binaries

on:
  push:
    tags:
      - 'v*' # Run whenever a version tag is pushed (e.g. v1.0.0)

permissions:
  contents: write # Required to create a release and upload assets
  packages: write # Required to publish npm packages to GitHub Packages

jobs:
  build-binaries:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile TypeScript
      run: npm run build

    - name: Package standalone binaries
      run: npm run build:binary

    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: |
          binaries/devdoctor-win.exe
          binaries/devdoctor-linux
          binaries/devdoctor-macos
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://npm.pkg.github.com'
        scope: '@m0rplex-16'

    - name: Install dependencies
      run: npm ci

    - name: Compile TypeScript
      run: npm run build

    - name: Check if package version already exists
      id: check_package_version
      run: |
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
          echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists. Skipping publish."
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to GitHub Packages
      if: steps.check_package_version.outputs.exists != 'true'
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
